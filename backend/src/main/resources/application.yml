spring:
  application:
    name: forep-exe
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:forep;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: ${SERVER_PORT:8080}

forep:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    service-url: ${AI_SERVICE_URL:}
    service-token: ${AI_SERVICE_TOKEN:}
    connect-timeout-millis: ${AI_SERVICE_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${AI_SERVICE_READ_TIMEOUT_MILLIS:10000}
    max-concurrent-requests: ${AI_SERVICE_MAX_CONCURRENT_REQUESTS:4}
    acquire-timeout-millis: ${AI_SERVICE_ACQUIRE_TIMEOUT_MILLIS:1000}
    dedupe-wait-millis: ${AI_SERVICE_DEDUPE_WAIT_MILLIS:14000}
    retry-after-seconds: ${AI_SERVICE_RETRY_AFTER_SECONDS:15}
    circuit-breaker-failure-threshold: ${AI_SERVICE_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
    circuit-breaker-open-millis: ${AI_SERVICE_CIRCUIT_BREAKER_OPEN_MILLIS:60000}
  payments:
    momo:
      endpoint: ${MOMO_PAYMENT_ENDPOINT:}
      partner-code: ${MOMO_PARTNER_CODE:}
      access-key: ${MOMO_ACCESS_KEY:}
      secret-key: ${MOMO_SECRET_KEY:}
      return-url: ${MOMO_RETURN_URL:}
      notify-url: ${MOMO_NOTIFY_URL:}
    bank:
      bank-code: ${BANK_TRANSFER_BANK_CODE:}
      bank-name: ${BANK_TRANSFER_BANK_NAME:}
      account-number: ${BANK_TRANSFER_ACCOUNT_NUMBER:}
      account-name: ${BANK_TRANSFER_ACCOUNT_NAME:}
      vietqr-template: ${VIETQR_TEMPLATE:https://img.vietqr.io/image/{bankCode}-{accountNumber}-compact2.png?amount={amount}&addInfo={content}&accountName={accountName}}
