spring:
  application:
    name: forep-exe
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:forep;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: ${SERVER_PORT:8080}

forep:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    service-url: ${AI_SERVICE_URL:}
    service-token: ${AI_SERVICE_TOKEN:}
    connect-timeout-millis: ${AI_SERVICE_CONNECT_TIMEOUT_MILLIS:10000}
    read-timeout-millis: ${AI_SERVICE_READ_TIMEOUT_MILLIS:120000}
