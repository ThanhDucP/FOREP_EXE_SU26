services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forep}
      POSTGRES_USER: ${POSTGRES_USER:-forep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forep}
    ports:
      - "5432:5432"
    volumes:
      - forep_postgres_data:/var/lib/postgresql/data

  ai-service:
    build:
      context: ./ai-service
    environment:
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-dev-internal-token}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"

  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-forep}
      DATABASE_USERNAME: ${POSTGRES_USER:-forep}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-forep}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-dev-internal-token}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-forep-files}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - postgres
      - ai-service

volumes:
  forep_postgres_data:
