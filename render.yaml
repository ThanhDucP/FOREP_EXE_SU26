services:
  - type: web
    name: forep-exe-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_SERVICE_URL
        value: https://forep-exe-ai.onrender.com
      - key: AI_SERVICE_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: forep-files
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: forep-exe-ai
    runtime: docker
    rootDir: ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AI_SERVICE_TOKEN
        sync: false
      - key: LLM_PROVIDER
        value: mock
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false

