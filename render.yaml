services:
  - type: web
    name: forep-exe-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_SERVICE_URL
        value: https://forep-exe-ai.onrender.com
      - key: AI_SERVICE_TOKEN
        sync: false
      - key: AI_SERVICE_CONNECT_TIMEOUT_MILLIS
        value: 3000
      - key: AI_SERVICE_READ_TIMEOUT_MILLIS
        value: 10000
      - key: AI_SERVICE_MAX_CONCURRENT_REQUESTS
        value: 3
      - key: AI_SERVICE_ACQUIRE_TIMEOUT_MILLIS
        value: 1000
      - key: AI_SERVICE_DEDUPE_WAIT_MILLIS
        value: 14000
      - key: AI_SERVICE_RETRY_AFTER_SECONDS
        value: 15
      - key: AI_SERVICE_CIRCUIT_BREAKER_FAILURE_THRESHOLD
        value: 5
      - key: AI_SERVICE_CIRCUIT_BREAKER_OPEN_MILLIS
        value: 60000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: forep-files
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: forep-exe-ai
    runtime: docker
    rootDir: ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AI_SERVICE_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AI_PROVIDER_TIMEOUT_SECONDS
        value: 10
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
